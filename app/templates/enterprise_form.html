<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8"><title>Новое предприятие</title></head><body>
<h1>Добавить предприятие</h1>

<form method="post" action="/admin/enterprises/new">
  <label>Номер:<br><input name="number" required></label><br><br>
  <label>Название:<br><input name="name" required></label><br><br>
  <label>Bot&nbsp;Token:<br><input name="bot_token" required></label><br><br>
  <label>Chat&nbsp;ID:<br><input name="chat_id" required></label><br><br>
  <label>IP:<br><input name="ip" required></label><br><br>
  <label>Host:<br><input name="host" required></label><br><br>

  <button type="submit">Сохранить</button>
  <a href="/admin/enterprises">Отмена</a>
</form>
</body></html>
