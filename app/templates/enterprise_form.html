<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"><title>Новое предприятие</title></head>
<body>
<a href="/admin/enterprises">← список</a>
<h1>Добавить предприятие</h1>

<form method="post">
  <p>ID / Number:     <input name="number" required></p>
  <p>Название:        <input name="name" required></p>
  <p>Bot Token:       <input name="bot_token" required></p>
  <p>Chat ID:         <input name="chat_id" required></p>
  <p>IP:              <input name="ip" required></p>
  <p>Secret:          <input name="secret" required></p>
  <p>Host:            <input name="host" required></p>
  <button type="submit">Сохранить</button>
</form>
</body></html>
