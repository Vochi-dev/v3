<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>{{ 'Редактирование' if enterprise else 'Создание' }} предприятия</title></head>
<body>
  <h1>{{ 'Редактирование' if enterprise else 'Создание' }} предприятия</h1>
  <form method="post">
    {% if not enterprise %}
    <label>Number: <input name="number" required></label><br>
    {% else %}
    <p>Number: {{ enterprise.number }}</p>
    {% endif %}
    <label>Name: <input name="name" value="{{ enterprise.name if enterprise else '' }}" required></label><br>
    <label>Name2: <input name="name2" value="{{ enterprise.name2 if enterprise else '' }}" required></label><br>
    <label>Bot Token: <input name="bot_token" value="{{ enterprise.bot_token if enterprise else '' }}" required></label><br>
    <label>Chat ID: <input name="chat_id" value="{{ enterprise.chat_id if enterprise else '' }}" required></label><br>
    <label>IP: <input name="ip" value="{{ enterprise.ip if enterprise else '' }}" required></label><br>
    <label>Secret: <input name="secret" value="{{ enterprise.secret if enterprise else '' }}" required></label><br>
    <label>Host: <input name="host" value="{{ enterprise.host if enterprise else '' }}" required></label><br>
    <button type="submit">Сохранить</button>
  </form>
  <p><a href="/admin/enterprises">← Назад к списку</a></p>
</body>
</html>
