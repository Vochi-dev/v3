<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"><title>Список предприятий</title></head>
<body>
<a href="/admin">← назад</a>
<h1>Список предприятий</h1>

<a href="/admin/enterprises/new">➕ Добавить предприятие</a>

<table border="1" cellpadding="4" cellspacing="0">
  <tr><th>ID</th><th>Название</th><th>Bot Token</th><th>Создано</th></tr>
  {% for r in rows %}
  <tr>
    <td>{{ r.number }}</td>
    <td>{{ r.name }}</td>
    <td>{{ r.bot_token }}</td>
    <td>{{ r.created_at }}</td>
  </tr>
  {% endfor %}
</table>
</body></html>
