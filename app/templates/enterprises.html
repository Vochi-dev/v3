<!DOCTYPE html>
<html lang="ru">
<head><meta charset="utf-8"><title>Предприятия</title></head>
<body>
  <a href="/admin/">← Назад</a>
  <h1>Список предприятий</h1>

  <table border="1" cellpadding="4">
    <tr><th>ID</th><th>Название</th><th>Bot Token</th><th>Создано</th></tr>
    {% for e in enterprises %}
      <tr>
        <td>{{ e.id }}</td><td>{{ e.name }}</td><td>{{ e.bot_token }}</td><td>{{ e.created_at }}</td>
      </tr>
    {% else %}
      <tr><td colspan="4">Пока пусто</td></tr>
    {% endfor %}
  </table>
</body>
</html>
