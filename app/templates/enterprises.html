<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Список предприятий</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      text-align: left;
    }
    code {
      user-select: all;
      white-space: nowrap;
    }
    .action-icon {
      margin-right: 10px;
      cursor: pointer;
      color: #007bff;
    }
    .action-icon:hover {
      color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Список предприятий</h1>
  <table id="enterprises-table">
    <thead>
      <tr>
        <th>Номер</th>
        <th>Название</th>
        <th>Секрет</th>
        <th>Bot Token <button onclick="copyAllTokens()">Копировать все</button></th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody>
      {% for enterprise in enterprises|sort(attribute='number', reverse=false) %}
      <tr data-number="{{ enterprise.number }}">
        <td>{{ enterprise.number }}</td>
        <td>{{ enterprise.name }}</td>
        <td><code>{{ enterprise.secret }}</code></td>
        <td><code id="token-{{ enterprise.number }}">{{ enterprise.bot_token }}</code></td>
        <td>
          <a href="/admin/enterprises/edit/{{ enterprise.number }}" title="Редактировать" class="action-icon"><i class="fa fa-edit"></i></a>
          <span onclick="confirmDelete('{{ enterprise.number }}')" title="Удалить" class="action-icon"><i class="fa fa-trash"></i></span>
          <span onclick="openMessageDialog('{{ enterprise.number }}')" title="Отправить сообщение" class="action-icon"><i class="fa fa-envelope"></i></span>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <script>
    function copyAllTokens() {
      const tokens = Array.from(document.querySelectorAll('code[id^="token-"]')).map(el => el.textContent.trim()).join('\n');
      navigator.clipboard.writeText(tokens).then(() => alert("Все токены скопированы в буфер обмена"));
    }

    function confirmDelete(number) {
      if (confirm(`Удалить предприятие с номером ${number}? Это действие необратимо.`)) {
        fetch(`/admin/enterprises/${number}`, { method: 'DELETE' })
          .then(resp => {
            if (resp.ok) {
              alert('Предприятие удалено');
              location.reload();
            } else {
              resp.json().then(data => alert(`Ошибка при удалении: ${data.detail || 'Unknown error'}`));
            }
          }).catch(() => alert('Ошибка соединения при удалении'));
      }
    }

    function openMessageDialog(number) {
      const message = prompt(`Введите сообщение для предприятия ${number}:`);
      if (!message) return;
      if (confirm(`Отправить сообщение предприятию ${number}?`)) {
        fetch(`/admin/enterprises/${number}/send_message`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ message })
        }).then(resp => {
          if (resp.ok) {
            alert('Сообщение отправлено');
          } else {
            resp.json().then(data => alert(`Ошибка при отправке сообщения: ${data.detail || 'Unknown error'}`));
          }
        }).catch(() => alert('Ошибка соединения при отправке сообщения'));
      }
    }
  </script>
</body>
</html>
