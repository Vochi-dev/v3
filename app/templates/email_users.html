<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление email-пользователями</title>

    <style>
        body { font-family: sans-serif; margin: 20px; }
        a.back { display:inline-block; margin-bottom:14px; text-decoration:none; }
        table { border-collapse: collapse; width:100%; }
        th, td { border:1px solid #999; padding:6px 8px; }
        th { background:#f2f2f2; }
        input[type="checkbox"] { pointer-events:none; }   /* только показ */
        form { margin-bottom: 18px; }
    </style>
</head>
<body>
    <a class="back" href="/admin">← Назад к панели</a>
    <h1>Управление email-пользователями</h1>

    <!-- форма загрузки CSV -->
    <form method="post" enctype="multipart/form-data" action="/admin/upload-emails">
        <input type="file" name="file" accept=".csv" required>
        <button type="submit">Загрузить CSV</button>
        <small>(экспортируйте список из Excel/Numbers как CSV UTF-8)</small>
    </form>

    <!-- таблица пользователей -->
    <table>
        <thead>
            <tr>
                <th>№</th>
                <th>Email</th>
                <th>Название</th>
                <th>All</th>
                <th>1</th>
                <th>2</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.number }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.name }}</td>
                <td><input type="checkbox" {% if user.right_all %}checked{% endif %}></td>
                <td><input type="checkbox" {% if user.right_1  %}checked{% endif %}></td>
                <td><input type="checkbox" {% if user.right_2  %}checked{% endif %}></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
