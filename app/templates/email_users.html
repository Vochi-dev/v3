<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление Email-пользователями</title>
</head>
<body>
    <h1>
        <a href="/admin" style="text-decoration:none;">← Назад</a>
        &nbsp;Управление Email-пользователями
    </h1>

    <form method="post" enctype="multipart/form-data" action="/admin/upload-emails">
        <input type="file" name="file" required>
        <button type="submit">Загрузить CSV</button>
    </form>

    <table border="1" cellspacing="0" cellpadding="4" style="margin-top:1em;">
        <thead>
            <tr>
                <th>№</th><th>Email</th><th>Название</th>
                <th>All</th><th>1</th><th>2</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.number }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.name }}</td>
                <td><input type="checkbox" {% if user.right_all %}checked{% endif %} disabled></td>
                <td><input type="checkbox" {% if user.right_1 %}checked{% endif %} disabled></td>
                <td><input type="checkbox" {% if user.right_2 %}checked{% endif %} disabled></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
