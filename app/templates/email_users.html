<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Список e-mail пользователей</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    th { background: #f0f0f0; }
    a.button { display: inline-block; margin-bottom: 1rem; padding: 0.5rem 1rem; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Список e-mail пользователей</h1>
  <div>
    <a href="/admin" class="button">Назад</a>
  </div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>e-mail</th>
        <th>Имя</th>
        <th>Все права</th>
        <th>Право 1</th>
        <th>Право 2</th>
      </tr>
    </thead>
    <tbody>
      {% for u in email_users %}
      <tr>
        <td>{{ u.number }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.name }}</td>
        <td>{{ u.right_all }}</td>
        <td>{{ u.right_1 }}</td>
        <td>{{ u.right_2 }}</td>
      </tr>
      {% else %}
      <tr>
        <td colspan="6">Нет пользователей</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
